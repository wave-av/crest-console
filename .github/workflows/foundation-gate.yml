name: foundation-gate

# Adopts the wave-foundation CI baseline. Vendored/added by scripts/propagate-baseline.mjs (E5).
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    uses: ./.github/workflows/_checks.yml
